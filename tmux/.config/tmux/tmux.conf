set-option -g default-shell /bin/zsh

# ==========================================
# 0. PLUGINS
# ==========================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# configure catppuccin plugin
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text '#W'
set -g @catppuccin_window_current_text '#W'
# Make the status line pretty and add some modules
set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

setw -g mode-keys vi

# ==========================================
# 1. GENERAL SETTINGS & QUALITY OF LIFE
# ==========================================

# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Enable mouse support
set -g mouse on

set -g default-terminal 'tmux-256color'

# Set prefix key to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# Increase scrollback buffer history
set -g history-limit 10000

# Fast escape time for snappy switching (critical for Vim/Neovim users)
set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ==========================================
# 2. PANE MANAGEMENT (Splits & Navigation)
# ==========================================

# Open panes in current directory
bind '-' split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Quick pane resizing using Prefix + H, J, K, L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# tmux window swapping
bind-key C-Left swap-window -t -1
bind-key C-Right swap-window -t +1

# ==========================================
# 3. WINDOW MANAGEMENT
# ==========================================

# Enable automatic renaming to show the current directory name
set -g status-interval 5
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Open new window in the current working directory
bind c new-window -c "#{pane_current_path}"

# Use Shift + Left/Right Arrow keys to switch windows WITHOUT prefix
bind -n M-H previous-window
bind -n M-L next-window

# Keybinding to manually rename a window (Prefix + R)
bind R command-prompt -I "#W" "rename-window '%%'"

# ==========================================
# 4. UTILS
# ==========================================

# Easy config reload with Prefix + r
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"
